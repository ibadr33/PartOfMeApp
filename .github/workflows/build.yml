name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Xcode Version
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Compile App via SwiftPM with iPhoneOS SDK
      run: |
        # جلب مسار الـ iPhoneOS SDK الرسمي داخل سيرفر الماك
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        
        # بناء الحزمة التنفيذية مع توجيه المترجم للمكتبات القياسية الخاصة بالآيفون مباشرة
        swift build \
          -c release \
          --triple arm64-apple-ios16.0 \
          -Xswiftc -sdk -Xswiftc "$SDK_PATH"

    - name: Export Unsigned IPA for TrollStore
      run: |
        # تجهيز المجلد القياسي للتطبيق
        mkdir -p Payload/PartOfMeApp.app
        
        # نقل الملف التنفيذي المستخرج من مسار بناء سويفت إلى حزمة التطبيق
        cp .build/arm64-apple-ios16.0/release/PartOfMeApp Payload/PartOfMeApp.app/PartOfMeApp
        
        # تزويد التطبيق بملف الخصائص والمعلومات الأساسي ليقبله الهاتف
        echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>PartOfMeApp</string><key>CFBundleIdentifier</key><string>com.badr.partofme</string><key>CFBundleName</key><string>جزء مني</string><key>CFBundlePackageType</key><string>APPL</string><key>CFBundleShortVersionString</key><string>1.0</string><key>CFBundleVersion</key><string>1</string><key>MinimumOSVersion</key><string>16.0</string></dict></plist>' > Payload/PartOfMeApp.app/Info.plist
        
        # ضغط المجلد وإنتاج ملف الـ IPA النهائي
        zip -r PartOfMe.ipa Payload
        
    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: PartOfMe-Unsigned-IPA
        path: PartOfMe.ipa
